services:

  db:
    image: postgres:13.10-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: .
    restart: always
    volumes:
      - static_volume:/app/collected_static
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - static_volume:/staticfiles
    command: cp -r /usr/share/nginx/html/. /staticfiles/

  gateway:
    image: nginx:1.25.2-alpine
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/staticfiles
      - media_volume:/mediafiles
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  static_volume:
  media_volume:
